run:
  name_prefix: cnn_dispersal
  project: rlmapf_iterative_dstar_dispersal
  group: cnn_dispersal_eval
  use_wandb: false
  tags: [evaluation, cnn, d_star, dispersal]
  notes: "Evaluation of CNN+D* dispersal-trained model"

hardware:
  num_cpus: 4
  num_gpus: 1

model:
  framework: torch
  api_stack:
    enable_rl_module_and_learner: false
    enable_env_runner_and_connector_v2: false
  model:
    conv_activation: relu
    conv_filters:
      - [64, [3, 3], 1]
      - [64, [3, 3], 1]
      - [64, [3, 3], 1]
    fcnet_hiddens: [512, 512, 256]

training:
  episodes: 1
  save_interval: 500
  eval_interval: 50
  evaluation_duration: 10
  evaluation_enabled: false

paths:
  save_dir: saved_models
  experiments_root: experiments/eval
  map_root: maps

environment:
  agents_num: 10
  max_steps: 250
  reward_closer_to_goal_final: true
  reward_final_d_star: false
  use_d_star_lite: true
  d_star_iterations: 3
  d_star_congestion_weight: 1.0
  d_star_path_progress_weight: 0.0
  use_cnn_observation: true
  collision_penalty: 0.5
  step_cost: 0.015
  wait_cost_multiplier: 2
  goal_reward: 10
  observation_type: array
  penalize_collision: true
  penalize_waiting: true
  penalize_steps: false
  reward_closer_to_goal_each_step: false
  reward_low_density: false
  penalize_left_side_bottom_passing: false
  use_collision_priority_multiplier: false
  render_mode: rgb_array
  render_delay: 0.01
  maps_names_with_variants:
    slots_10-10a-39x29: null

eval_sync_train_config: true  # auto-sync env/model with checkpoint training config

# Evaluation parameters
eval_agents_range: "4-20"
eval_repeats: 10
eval_num_threads: 2
eval_video_fps: 10
eval_smooth_motion: true
eval_motion_frames: 5
