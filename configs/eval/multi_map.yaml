run:
  name_prefix: multi_map
  project: rlmapf_multi_map
  group: multi_map_eval
  use_wandb: false
  tags: [evaluation, multi-map]
  notes: "Multi-map evaluation across different environments"

hardware:
  num_cpus: 4
  num_gpus: 1

model:
  framework: torch
  api_stack:
    enable_rl_module_and_learner: false
    enable_env_runner_and_connector_v2: false
  model:
    fcnet_hiddens: [1024, 512, 512]
    fcnet_activation: relu

training:
  episodes: 1
  save_interval: 500
  eval_interval: 50
  evaluation_duration: 10
  evaluation_enabled: false

paths:
  save_dir: saved_models
  experiments_root: experiments/eval
  map_root: maps

environment:
  agents_num: 10
  max_steps: 250
  reward_closer_to_goal_final: true
  reward_final_d_star: false
  use_d_star_lite: false
  use_cnn_observation: false
  observation_mode: flat_grid
  observation_radius: 3
  collision_penalty: 0.1
  step_cost: 0.02
  maps_names_with_variants:
    big_empty_1-100a-20x20: null  # Will be overridden by eval_maps

eval_sync_train_config: true  # auto-sync eval env/model with the checkpoint's training config

# Multi-map evaluation configuration
eval_maps:
  enabled: true
  maps:
    - name: slots_10-10a-39x29
      variants: null
      label: "slots_10"
    - name: pprai_1-20a-42x39
      variants: null
      label: "Warehouse"
    - name: big_empty_1-100a-20x20
      variants: null
      label: "Basic1"
    - name: box_4-4a-10x8
      variants: null
      label: "Box_4"
  aggregate_results: true
  generate_comparison_plots: true

# Evaluation parameters
eval_agents_range: "1-20"
eval_repeats: 10
eval_num_threads: 2
eval_video_fps: 10
eval_smooth_motion: true  # Enable smooth agent motion in videos
eval_motion_frames: 5     # Number of interpolation frames per step (higher = smoother but larger file)
