maps: [maze4_1-100a-30x30]  # optional: global map override applied to all runs (variants = null)
video_once_per_agent: true  # optional: when render_video is true, emit only one video per agent count (across repeats)
video_best_repeat_per_agent: true  # optional: render a single video per agent count using the best repeat

runs:

  - config: baseline
    checkpoint: 1            # numeric shortcut or full path
    checkpoint_group: experiments/train/baseline-20260120-234412-7627  # target the intended run dir
    name_suffix: baseline    # appended to run-name if run_name not set
    repeats: 5
    num_threads: 2
    sync_train_config: true  # align env/model with checkpoint
    overrides:
      - eval_agents_range=1-20
    render_video: false

