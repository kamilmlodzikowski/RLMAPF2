runs:
  - config: cnn
    checkpoint: 1            # numeric shortcut or full path
    checkpoint_group: experiments/train/cnn-20260107-080543-8187  # target the intended run dir
    name_suffix: cnn_best    # appended to run-name if run_name not set
    repeats: 5
    num_threads: 2
    sync_train_config: true  # align env/model with checkpoint
    overrides:
      - eval_agents_range=4-12
    render_video: false

  - config: baseline
    checkpoint: experiments/train/baseline-20260107-044609-4687/checkpoints/baseline-20260107-044609-4687_final
    name_suffix: baseline_final
    overrides:
      - eval_agents_range=4-10
    render_video: false

  - config: cnn_iterative_dstar
    checkpoint: 1
    checkpoint_group: experiments/train/cnn-iterative-dstar-20260107-220209-7787
    name_suffix: dstar_best
    repeats: 5
    num_threads: 2
    sync_train_config: true
    overrides:
      - eval_agents_range=6-14
    success_threshold: 90
    render_video: false
